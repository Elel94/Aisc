name: "Terraform Advanced CI"
 
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
 
permissions:
  contents: read
  pull-requests: write
  security-events: write
 
env:
  TF_VERSION: "1.6.6"
 
jobs:
  lint-security:
    name: "Lint & Security Scan"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
 
      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
 
      - name: "Terraform Format Check"
        run: terraform fmt -check -recursive -diff
 
      - name: "Terraform Init"
        run: terraform init
 
      - name: "Terraform Validate"
        run: terraform validate
 
      - name: "Setup TFLint"
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.50.3
 
      - name: "Run TFLint"
        run: tflint --recursive
 
      - name: "Run Checkov"
        id: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,results.sarif
          soft_fail: true
 
  plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    needs: lint-security
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
 
      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
 
      - name: "Terraform Init"
        run: terraform init
 
      - name: "Terraform Plan DEV"
        run: terraform plan -var-file=dev.tfvars -out=dev.tfplan
 
      - name: "Terraform Plan STAGING"
        run: terraform plan -var-file=staging.tfvars -out=staging.tfplan
 
      - name: "Terraform Plan PROD"
        run: terraform plan -var-file=prod.tfvars -out=prod.tfplan
 
      - name: "Export plans to JSON"
        run: |
          terraform show -json dev.tfplan > dev-plan.json
          terraform show -json staging.tfplan > staging-plan.json
          terraform show -json prod.tfplan > prod-plan.json
 
      - name: "Run Cost/Logical Estimates"
        run: |
          python3 scripts/estimate.py dev-plan.json > dev-estimate.txt
          python3 scripts/estimate.py staging-plan.json > staging-estimate.txt
          python3 scripts/estimate.py prod-plan.json > prod-estimate.txt
 
      - name: "Upload plan artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: terraform-advanced-plans
          path: |
            dev-plan.json
            staging-plan.json
            prod-plan.json
            dev-estimate.txt
            staging-estimate.txt
            prod-estimate.txt
 
      - name: "Comment PR with Estimates"
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const dev = fs.readFileSync("dev-estimate.txt", "utf8");
            const staging = fs.readFileSync("staging-estimate.txt", "utf8");
            const prod = fs.readFileSync("prod-estimate.txt", "utf8");
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform logical estimation\n\n### DEV\n\`\`\`\n${dev}\n\`\`\`\n### STAGING\n\`\`\`\n${staging}\n\`\`\`\n### PROD\n\`\`\`\n${prod}\n\`\`\``
            });